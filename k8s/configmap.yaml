apiVersion: v1
kind: ConfigMap
metadata:
  name: openchat-config
  namespace: default
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "12345"
  DB_PATH: "/data/openchat.db"
  MAX_CONNECTIONS: "1000"
  CONNECTION_TIMEOUT: "300"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  ENABLE_METRICS: "true"
  ENABLE_HEALTH_CHECK: "true"
