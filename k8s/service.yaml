apiVersion: v1
kind: Service
metadata:
  name: openchat-service
  namespace: default
  labels:
    app: openchat
spec:
  type: LoadBalancer
  selector:
    app: openchat
  ports:
    - name: chat
      port: 12345
      targetPort: 12345
      protocol: TCP
  # For internal cluster communication
  clusterIP: None  # Headless service for StatefulSet
---
apiVersion: v1
kind: Service
metadata:
  name: openchat-service-internal
  namespace: default
  labels:
    app: openchat
spec:
  type: ClusterIP
  selector:
    app: openchat
  ports:
    - name: chat
      port: 12345
      targetPort: 12345
      protocol: TCP
